# mongod.conf

# where to write logging data.
systemLog:
  destination: file
  logAppend: true
  path: /data/db/docker-initdb.log

# Where and how to store data.
storage:
  dbPath: /data/db
  journal:
    enabled: true
#  engine:
#  wiredTiger:

# how the process runs
processManagement:
  fork: true
  pidFilePath: /tmp/mongod.pid
  timeZoneInfo: /usr/share/zoneinfo

# network interfaces
net:
  port: 27017
  bindIp: 0.0.0.0,::
